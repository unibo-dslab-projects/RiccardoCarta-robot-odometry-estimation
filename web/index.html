<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Dog Control</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-info">
    <div class="container-fluid vh-100 d-flex flex-column p-3">
        <h1 class="text-center mb-3">Robot Dog Control</h1>
        <div class="row flex-grow-1 g-3">
            <div class="col-md-5 d-flex flex-column gap-3">
                <div class="card p-3">
                    <div class="mb-2">
                        <label class="form-label">Step duration (ms)</label>
                        <div class="input-group">
                            <label for="stepSize" hidden>Step size</label><input type="number" id="stepSize" class="form-control" min="500" step="500" value="1000">
                            <button class="btn btn-primary" id="setStepButton">Set</button>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label for="numSteps" class="form-label">Number of steps</label>
                        <input type="number" id="numSteps" class="form-control" min="1" max="50" value="1">
                    </div>
                </div>

                <div class="card p-3 flex-grow-1 d-flex flex-column justify-content-center">
                    <div class="movement-buttons">
                        <button class="btn btn-primary w-100">Forward</button>
                        <button class="btn btn-primary w-100">Left</button>
                        <button class="btn btn-primary w-100">Right</button>
                        <button class="btn btn-primary w-100">Backward</button>
                        <button class="btn btn-info w-100">Turn Left</button>
                        <button class="btn btn-info w-100">Turn Right</button>
                    </div>
                </div>

                <div class="card p-3">
                    <button class="btn btn-secondary w-100 relax-btn">Relax</button>
                </div>
            </div>

            <div class="col-md-7 d-flex flex-column gap-3">
                <div class="card flex-grow-1 p-3 d-flex flex-column">
                    <canvas id="robotCanvas" class="flex-grow-1 w-100"></canvas>
                    <button class="btn btn-outline-danger mt-3" id="resetCanvas">Reset</button>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="card p-3 h-100 d-flex flex-column justify-content-center gap-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted">Battery Voltage: </span>
                                <span id="batteryVolt" class="fw-semibold">0 V</span>
                            </div>

                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted">Battery Percentage: </span>
                                <span id="batteryPerc" class="fw-semibold">0%</span>
                            </div>

                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted">Distance from Object: </span>
                                <span id="distanceFromObject" class="fw-semibold">0 cm</span>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card p-3 h-100">
                            <label class="form-label">Measured displacement</label>
                            <div class="mb-2">
                                <label for="distanceX" class="form-label small">Δx (cm)</label>
                                <input type="number" id="distanceX" class="form-control">
                            </div>

                            <div class="mb-2">
                                <label for="distanceY" class="form-label small">Δy (cm)</label>
                                <input type="number" id="distanceY" class="form-control">
                            </div>

                            <button class="btn btn-success w-100 mt-2" id="saveButton">
                                Save Measurement
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
